# Netlify configuration

[build]
  publish = "."

# Always revalidate HTML so deploys show immediately (no stale cache)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Root path too
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CSS/JS revalidate as well (styles are inline + style.css)
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Images can be cached longer (they rarely change once published)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
